<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        button { padding: 20px 40px; font-size: 20px; background: #4507cc; color: white; border: none; border-radius: 12px; }
    </style>
</head>
<body>
    <h1>Вітрина</h1>
    <p id="status">Завантаження...</p>
    <button id="mainButton">Купити товар</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        
        // Якщо JS працює, напис зміниться
        document.getElementById('status').innerText = "JS працює!";

        document.getElementById('mainButton').addEventListener('click', function() {
            // Спробуємо інший спосіб відправки
            tg.sendData(JSON.stringify({action: "buy_item"}));
            tg.close();
        });
    </script>
</body>
</html>
