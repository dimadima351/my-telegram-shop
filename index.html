<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; }
        .item { display: flex; justify-content: space-between; margin-bottom: 10px; padding: 10px; border-bottom: 1px solid #ccc; }
        #cart { margin-top: 20px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px; background: #2481cc; color: white; border: none; }
    </style>
</head>
<body>
    <h2>Товари</h2>
    <div id="items"></div>
    <div id="cart">Кошик: 0 грн</div>
    <input type="tel" id="phone" placeholder="Ваш номер телефону">
    <button onclick="checkout()">Оформити замовлення</button>

    <script>
        let tg = window.Telegram.WebApp;
        let cart = {};
        const items = Array.from({length: 10}, (_, i) => ({id: i+1, name: `Товар ${i+1}`, price: (i+1)*100}));

        // Малюємо товари
        items.forEach(item => {
            document.getElementById('items').innerHTML += `
                <div class="item">
                    ${item.name} (${item.price} грн)
                    <button onclick="addToCart(${item.id})">+</button>
                </div>`;
        });

        function addToCart(id) {
            cart[id] = (cart[id] || 0) + 1;
            updateTotal();
        }

        function updateTotal() {
            let total = items.reduce((sum, item) => sum + (cart[item.id] || 0) * item.price, 0);
            document.getElementById('cart').innerText = `Кошик: ${total} грн`;
        }

        function checkout() {
            let phone = document.getElementById('phone').value;
            tg.sendData(JSON.stringify({cart: cart, phone: phone}));
            tg.close();
        }
    </script>
</body>
</html>
