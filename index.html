<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #fdfdfd; }
        h1 { font-size: 3em; text-align: center; }
        
        /* Сітка: 3 товари в ряд для ноутбуків */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        
        .item { background: white; padding: 30px; border-radius: 25px; text-align: center; border: 2px solid #eee; }
        .item h3 { font-size: 2em; margin: 20px 0; }
        .price { font-size: 1.8em; font-weight: bold; color: #27ae60; margin-bottom: 20px; }
        .add-btn { font-size: 1.5em; padding: 20px; background: #27ae60; color: white; border: none; border-radius: 15px; width: 100%; cursor: pointer; }

        /* Кошик */
        #cart-popup { display: none; position: fixed; right: 0; top: 0; width: 400px; height: 100%; background: white; padding: 40px; box-shadow: -5px 0 20px rgba(0,0,0,0.1); }
        .cart-item { font-size: 1.5em; margin-bottom: 20px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <h1>🍎 Фруктова Лавка 🍇</h1>
    <div class="grid" id="items"></div>
    
    <button onclick="toggleCart()" style="position:fixed; bottom:40px; right:40px; padding:25px; font-size:2em; border-radius:50%; background:#27ae60; color:white; border:none;">🛒</button>

    <div id="cart-popup">
        <button onclick="toggleCart()" style="float:right; font-size:2em;">❌</button>
        <h2>Ваш кошик</h2>
        <div id="cart-list"></div>
        <input type="tel" id="phone" placeholder="Номер телефону" style="width:100%; font-size:1.5em; padding:15px; margin:20px 0;">
        <button class="add-btn" onclick="checkout()">ЗАМОВИТИ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = {};
        const items = [
            {id: 1, name: "Яблука", price: 35}, {id: 2, name: "Банани", price: 50},
            {id: 3, name: "Апельсини", price: 65}, {id: 4, name: "Ківі", price: 80},
            {id: 5, name: "Манго", price: 150}, {id: 6, name: "Ананас", price: 120},
            {id: 7, name: "Виноград", price: 90}, {id: 8, name: "Груші", price: 45},
            {id: 9, name: "Полуниця", price: 110}, {id: 10, name: "Персики", price: 95}
        ];

        items.forEach(item => {
            document.getElementById('items').innerHTML += `
                <div class="item">
                    <h3>${item.name}</h3>
                    <p class="price">${item.price} грн/кг</p>
                    <button class="add-btn" onclick="addToCart(${item.id})">Додати</button>
                </div>`;
        });

        function addToCart(id) { cart[id] = (cart[id] || 0) + 1; renderCart(); }
        function toggleCart() { document.getElementById('cart-popup').style.display = document.getElementById('cart-popup').style.display === 'block' ? 'none' : 'block'; }
        
        function renderCart() {
            let list = document.getElementById('cart-list'); list.innerHTML = '';
            for(let id in cart) {
                let item = items.find(i => i.id == id);
                list.innerHTML += `<div class="cart-item">${item.name} x${cart[id]} <button onclick="deleteItem(${id})">❌</button></div>`;
            }
        }
        function deleteItem(id) { delete cart[id]; renderCart(); }
        function checkout() { tg.sendData(JSON.stringify({cart, phone: document.getElementById('phone').value})); }
    </script>
</body>
</html>
