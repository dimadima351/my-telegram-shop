<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; padding: 10px; background: #f0f2f5; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item { background: white; padding: 10px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item img { width: 100%; height: 100px; border-radius: 10px; background: #ddd; }
        h3 { margin: 10px 0; font-size: 18px; }
        .price { font-weight: bold; color: #2481cc; }
        .add-btn { background: #2481cc; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 5px; cursor: pointer; }

        /* Попап кошика */
        #cart-popup { display: none; position: fixed; bottom: 0; width: 100%; height: 80%; background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 20px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Наш Магазин</h1>
    <div class="grid" id="items"></div>
    
    <button onclick="toggleCart()" style="position:fixed; bottom:20px; right:20px; padding:15px; border-radius:50%; background:green; color:white; border:none;">🛒</button>

    <div id="cart-popup">
        <button onclick="toggleCart()" style="float:right;">❌</button>
        <h2>Кошик</h2>
        <div id="cart-list"></div>
        <input type="tel" id="phone" placeholder="Ваш номер телефону" style="width:100%; padding:10px;">
        <button class="add-btn" onclick="checkout()">ЗАМОВИТИ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = {};
        const items = Array.from({length: 10}, (_, i) => ({id: i+1, name: `Товар ${i+1}`, price: (i+1)*50}));

        items.forEach(item => {
            document.getElementById('items').innerHTML += `
                <div class="item">
                    <div style="background: hsl(${item.id*30}, 70%, 80%); height: 100px;"></div>
                    <h3>${item.name}</h3>
                    <p class="price">${item.price} грн</p>
                    <button class="add-btn" onclick="addToCart(${item.id})">Додати</button>
                </div>`;
        });

        function addToCart(id) {
            cart[id] = (cart[id] || 0) + 1;
            renderCart();
        }

        function toggleCart() {
            let p = document.getElementById('cart-popup');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function renderCart() {
            let list = document.getElementById('cart-list');
            list.innerHTML = '';
            for(let id in cart) {
                let item = items.find(i => i.id == id);
                list.innerHTML += `<div class="cart-item">${item.name} x${cart[id]} <button onclick="deleteItem(${id})">❌</button></div>`;
            }
        }

        function deleteItem(id) { delete cart[id]; renderCart(); }

        function checkout() {
            let phone = document.getElementById('phone').value;
            tg.sendData(JSON.stringify({cart, phone}));
        }
    </script>
</body>
</html>
