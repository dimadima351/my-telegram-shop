<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #2481cc; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>Ласкаво просимо в магазин!</h1>
    <button id="mainButton">Купити товар</button>

    <script>
        // Ініціалізація Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Розгортаємо додаток на весь екран

        // Дія при натисканні кнопки
        document.getElementById('mainButton').addEventListener('click', function() {
            tg.sendData("buy_button_clicked");
            tg.close(); // Закриття вікна після натискання
        });
    </script>
</body>
</html>
